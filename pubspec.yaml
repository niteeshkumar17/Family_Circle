name: family_nest
description: "Family safety and location tracking app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.17.5
  firebase_database: ^10.5.7
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.10.7
  firebase_storage: ^11.6.5

  # Location & Maps
  location: ^5.0.3
  geocoding: ^2.2.0
  google_maps_flutter: ^2.10.0
  flutter_polyline_points: ^2.1.0

  # Background Services
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.3.1
  flutter_local_notifications: ^18.0.1

  # Utilities
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  intl: ^0.18.1
  permission_handler: ^11.1.0
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  uuid: ^4.3.3

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^6.0.0

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Data Classes
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Google Sign-In
  google_sign_in: ^6.1.6  # Downgraded to avoid PigeonUserDetails bug

  # Battery Info
  battery_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

# Remove overrides

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  

